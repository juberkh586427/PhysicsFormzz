
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0618;
  --bg2:#130920;
  --purple:#6b21a8;
  --amethyst:#9333ea;
  --amethyst2:#a855f7;
  --amethyst3:#c084fc;
  --amethyst4:#e9d5ff;
  --white:#f5f0ff;
  --muted:#c4b5e0;
}
body{background:var(--bg);color:var(--white);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}

/* starfield bg */
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 20% 30%,rgba(147,51,234,0.18) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 70%,rgba(107,33,168,0.15) 0%,transparent 50%),
             radial-gradient(ellipse at 50% 10%,rgba(168,85,247,0.1) 0%,transparent 40%);
  pointer-events:none;z-index:0}

/* Wavy blob shape */
@keyframes wave{0%,100%{border-radius:60% 40% 55% 45%/50% 60% 40% 50%}25%{border-radius:40% 60% 45% 55%/60% 40% 55% 45%}50%{border-radius:55% 45% 60% 40%/45% 55% 50% 50%}75%{border-radius:45% 55% 40% 60%/55% 45% 60% 40%}}

.wavy-card{
  position:relative;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(8px);
  border:1px solid rgba(168,85,247,0.3);
  border-radius:60% 40% 55% 45%/50% 60% 40% 50%;
  animation:wave 8s ease-in-out infinite;
  padding:2rem 2.5rem;
  margin:0.5rem 0;
  color:var(--white);
}
.wavy-card:nth-child(2n){animation-delay:-2s;border-radius:45% 55% 60% 40%/55% 45% 40% 60%}
.wavy-card:nth-child(3n){animation-delay:-4s;border-radius:50% 50% 45% 55%/60% 40% 55% 45%}

/* Bubbles */
.bubble{
  position:absolute;border-radius:50%;
  background:rgba(168,85,247,0.2);border:1px solid rgba(168,85,247,0.4);
  pointer-events:none;animation:float linear infinite}
@keyframes float{0%{transform:translateY(0) scale(1);opacity:0.6}100%{transform:translateY(-60px) scale(0.5);opacity:0}}

/* Layout */
.app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:2rem 1.5rem}

/* Header */
header{text-align:center;padding:2.5rem 0 1.5rem}
header h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3rem);font-weight:700;
  background:linear-gradient(135deg,var(--amethyst3),var(--amethyst4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.5px}
header p{color:var(--muted);font-size:0.9rem;margin-top:0.4rem;font-weight:300}

/* Nav tabs */
.tabs{display:flex;gap:0.5rem;margin:1.5rem 0;background:rgba(255,255,255,0.04);padding:0.35rem;border-radius:14px;border:1px solid rgba(168,85,247,0.2)}
.tab{flex:1;padding:0.6rem;text-align:center;cursor:pointer;border-radius:10px;font-size:0.85rem;transition:all 0.25s;color:var(--muted);border:none;background:transparent;font-family:'Inter',sans-serif}
.tab.active{background:rgba(147,51,234,0.5);color:var(--white);border:1px solid rgba(168,85,247,0.5)}
.tab:hover:not(.active){background:rgba(168,85,247,0.1);color:var(--amethyst3)}

/* Notes section */
.notes-section{display:none}
.notes-section.active{display:block}

/* Topic list */
.topics-list{display:flex;flex-direction:column;gap:1.2rem}

/* Wavy card inner */
.wavy-card .card-label{font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--amethyst3);font-weight:500;margin-bottom:0.3rem}
.wavy-card h2{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:600;color:var(--white);margin-bottom:0.5rem}
.wavy-card p{color:var(--muted);font-size:0.9rem;line-height:1.7}
.wavy-card .formula{font-family:'Fira Code',monospace;font-size:1.05rem;color:var(--amethyst3);background:rgba(168,85,247,0.15);padding:0.4rem 1rem;border-radius:8px;display:inline-block;margin:0.5rem 0}
.wavy-card .actions{display:flex;gap:0.5rem;margin-top:0.8rem;flex-wrap:wrap}
.wavy-card .del-btn{background:rgba(255,60,60,0.12);border:1px solid rgba(255,80,80,0.3);color:#ff9a9a;padding:0.3rem 0.75rem;border-radius:20px;cursor:pointer;font-size:0.78rem;transition:all 0.2s;font-family:'Inter',sans-serif}
.wavy-card .del-btn:hover{background:rgba(255,60,60,0.25)}

/* Add form */
.add-form{background:rgba(255,255,255,0.04);border:1px solid rgba(168,85,247,0.25);border-radius:20px;padding:1.5rem;margin-top:1rem}
.add-form h3{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--amethyst3);margin-bottom:1rem}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:0.78rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:0.4rem}
.form-group input,.form-group textarea,.form-group select{
  width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(168,85,247,0.3);
  border-radius:12px;padding:0.65rem 1rem;color:var(--white);font-size:0.9rem;font-family:'Inter',sans-serif;
  outline:none;transition:border-color 0.2s;resize:vertical}
.form-group input:focus,.form-group textarea:focus{border-color:var(--amethyst2)}
.form-group select option{background:#1a0630;color:var(--white)}
textarea{min-height:80px}
.btn-primary{background:linear-gradient(135deg,var(--purple),var(--amethyst));border:none;color:var(--white);padding:0.65rem 1.5rem;border-radius:25px;cursor:pointer;font-size:0.9rem;font-family:'Inter',sans-serif;font-weight:500;transition:all 0.25s;letter-spacing:0.3px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(147,51,234,0.4)}
.btn-outline{background:transparent;border:1px solid rgba(168,85,247,0.4);color:var(--amethyst3);padding:0.65rem 1.5rem;border-radius:25px;cursor:pointer;font-size:0.9rem;font-family:'Inter',sans-serif;transition:all 0.2s}
.btn-outline:hover{background:rgba(168,85,247,0.1)}

/* Calculator */
.calc-wrap{display:flex;justify-content:center}
.calculator{width:100%;max-width:380px;background:rgba(255,255,255,0.05);border:1px solid rgba(168,85,247,0.3);border-radius:24px;overflow:hidden}
.calc-display{padding:1.2rem 1.5rem;border-bottom:1px solid rgba(168,85,247,0.2);min-height:90px;display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-end}
.calc-expr{color:var(--muted);font-size:0.85rem;font-family:'Fira Code',monospace;min-height:1.2rem;word-break:break-all}
.calc-val{font-family:'Fira Code',monospace;font-size:2rem;color:var(--white);font-weight:500;word-break:break-all}
.calc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:rgba(168,85,247,0.1)}
.calc-btn{padding:0.85rem 0;font-size:0.9rem;border:none;cursor:pointer;font-family:'Fira Code',monospace;transition:all 0.15s;font-weight:500;background:rgba(13,6,24,0.8);color:var(--white)}
.calc-btn:hover{background:rgba(147,51,234,0.3)}
.calc-btn:active{transform:scale(0.95)}
.calc-btn.op{color:var(--amethyst3)}
.calc-btn.fn{font-size:0.72rem;color:var(--amethyst3);font-family:'Inter',sans-serif}
.calc-btn.eq{background:rgba(147,51,234,0.6);color:var(--white)}
.calc-btn.eq:hover{background:rgba(147,51,234,0.8)}
.calc-btn.clr{color:#ff9a9a}
.calc-btn.zero{grid-column:span 2}

/* Empty state */
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty i{font-size:2.5rem;opacity:0.3;display:block;margin-bottom:0.75rem}

/* Tag badge */
.tag{display:inline-block;background:rgba(147,51,234,0.3);border:1px solid rgba(168,85,247,0.4);color:var(--amethyst3);font-size:0.7rem;padding:0.2rem 0.6rem;border-radius:20px;margin:0 0.25rem 0.25rem 0;letter-spacing:0.5px}

.toggle-add{background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.35);color:var(--amethyst3);padding:0.5rem 1.2rem;border-radius:20px;cursor:pointer;font-size:0.85rem;font-family:'Inter',sans-serif;transition:all 0.2s;margin-bottom:1rem}
.toggle-add:hover{background:rgba(168,85,247,0.25)}
.toggle-add.open{background:rgba(147,51,234,0.4);color:var(--white)}

/* Scrollable notes */
.notes-scroll{max-height:70vh;overflow-y:auto;padding-right:4px}
.notes-scroll::-webkit-scrollbar{width:4px}
.notes-scroll::-webkit-scrollbar-track{background:transparent}
.notes-scroll::-webkit-scrollbar-thumb{background:rgba(168,85,247,0.3);border-radius:2px}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>⚛ PhysicsNotes</h1>
    <p>Your personal space for formulas, topics &amp; derivations</p>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('notes')">📐 Notes</button>
    <button class="tab" onclick="switchTab('calc')">🧮 Calculator</button>
  </div>

  <!-- NOTES TAB -->
  <div class="notes-section active" id="tab-notes">
    <button class="toggle-add" id="toggleBtn" onclick="toggleForm()">＋ Add new entry</button>

    <div class="add-form" id="addForm" style="display:none">
      <h3>New Physics Entry</h3>
      <div class="form-group">
        <label>Category</label>
        <select id="entryCategory">
          <option>Mechanics</option>
          <option>Thermodynamics</option>
          <option>Electromagnetism</option>
          <option>Quantum Physics</option>
          <option>Optics</option>
          <option>Waves</option>
          <option>Nuclear Physics</option>
          <option>Relativity</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Topic / Title</label>
        <input type="text" id="entryTitle" placeholder="e.g. Newton's Second Law">
      </div>
      <div class="form-group">
        <label>Formula (optional)</label>
        <input type="text" id="entryFormula" placeholder="e.g. F = ma">
      </div>
      <div class="form-group">
        <label>Notes / Explanation</label>
        <textarea id="entryNotes" placeholder="Add your explanation, derivation, or any notes here..."></textarea>
      </div>
      <div style="display:flex;gap:0.7rem;flex-wrap:wrap">
        <button class="btn-primary" onclick="addEntry()">Save Entry</button>
        <button class="btn-outline" onclick="toggleForm()">Cancel</button>
      </div>
    </div>

    <div class="notes-scroll">
      <div class="topics-list" id="notesList"></div>
    </div>
  </div>

  <!-- CALCULATOR TAB -->
  <div class="notes-section" id="tab-calc">
    <div class="calc-wrap">
      <div class="calculator">
        <div class="calc-display">
          <div class="calc-expr" id="calcExpr"></div>
          <div class="calc-val" id="calcVal">0</div>
        </div>
        <div class="calc-grid">
          <!-- Row 1 -->
          <button class="calc-btn fn" onclick="calcFn('sin(')">sin</button>
          <button class="calc-btn fn" onclick="calcFn('cos(')">cos</button>
          <button class="calc-btn fn" onclick="calcFn('tan(')">tan</button>
          <button class="calc-btn fn" onclick="calcFn('log(')">log</button>
          <button class="calc-btn fn" onclick="calcFn('ln(')">ln</button>
          <!-- Row 2 -->
          <button class="calc-btn fn" onclick="calcFn('sqrt(')">√x</button>
          <button class="calc-btn fn" onclick="calcFn('Math.PI')">π</button>
          <button class="calc-btn fn" onclick="calcFn('Math.E')">e</button>
          <button class="calc-btn fn" onclick="calcFn('^')">xʸ</button>
          <button class="calc-btn fn" onclick="calcFn('(')">( )</button>
          <!-- Row 3 -->
          <button class="calc-btn clr" onclick="calcClear()">C</button>
          <button class="calc-btn clr" onclick="calcBack()">⌫</button>
          <button class="calc-btn op" onclick="calcFn('%')">%</button>
          <button class="calc-btn op" onclick="calcFn('/')">÷</button>
          <button class="calc-btn fn" onclick="calcFn('1/')">1/x</button>
          <!-- Row 4 -->
          <button class="calc-btn" onclick="calcInput('7')">7</button>
          <button class="calc-btn" onclick="calcInput('8')">8</button>
          <button class="calc-btn" onclick="calcInput('9')">9</button>
          <button class="calc-btn op" onclick="calcFn('*')">×</button>
          <button class="calc-btn fn" onclick="calcFn('abs(')">|x|</button>
          <!-- Row 5 -->
          <button class="calc-btn" onclick="calcInput('4')">4</button>
          <button class="calc-btn" onclick="calcInput('5')">5</button>
          <button class="calc-btn" onclick="calcInput('6')">6</button>
          <button class="calc-btn op" onclick="calcFn('-')">−</button>
          <button class="calc-btn fn" onclick="calcFn('floor(')">⌊x⌋</button>
          <!-- Row 6 -->
          <button class="calc-btn" onclick="calcInput('1')">1</button>
          <button class="calc-btn" onclick="calcInput('2')">2</button>
          <button class="calc-btn" onclick="calcInput('3')">3</button>
          <button class="calc-btn op" onclick="calcFn('+')">+</button>
          <button class="calc-btn fn" onclick="calcFn('ceil(')">⌈x⌉</button>
          <!-- Row 7 -->
          <button class="calc-btn zero" onclick="calcInput('0')">0</button>
          <button class="calc-btn" onclick="calcInput('.')">.</button>
          <button class="calc-btn eq" onclick="calcEval()">=</button>
          <button class="calc-btn fn" onclick="calcFn('E')" style="font-family:Inter">EXP</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// --- DATA ---
let notes = [
  {id:1,category:'Mechanics',title:"Newton's Second Law",formula:'F = ma',notes:'Force equals mass times acceleration. Describes how the velocity of an object changes when subjected to an external force. Valid in inertial reference frames.',tags:['Newton','Force','Dynamics']},
  {id:2,category:'Thermodynamics',title:'Ideal Gas Law',formula:'PV = nRT',notes:'Relates pressure, volume, amount, and temperature of an ideal gas. R = 8.314 J/(mol·K) is the universal gas constant. Assumes no intermolecular forces.',tags:['Gas','Temperature','Pressure']},
  {id:3,category:'Electromagnetism',title:"Coulomb's Law",formula:'F = k·q₁q₂/r²',notes:'Electrostatic force between two point charges. k = 8.99×10⁹ N·m²/C² is Coulomb\'s constant. Force is attractive for opposite charges, repulsive for like charges.',tags:['Electric','Force','Charge']},
  {id:4,category:'Quantum Physics',title:'de Broglie Wavelength',formula:'λ = h/p',notes:'Every particle with momentum p has an associated wavelength λ. h = 6.626×10⁻³⁴ J·s is Planck\'s constant. Foundation of wave-particle duality.',tags:['Quantum','Wave','Momentum']},
];
let nextId = 5;

// --- RENDER ---
function renderNotes(){
  const list = document.getElementById('notesList');
  if(!notes.length){
    list.innerHTML=`<div class="empty"><span style="font-size:2rem">🔭</span><br>No entries yet. Add your first formula above.</div>`;
    return;
  }
  list.innerHTML=notes.map((n,i)=>`
    <div class="wavy-card" style="animation-delay:${-i*1.5}s">
      ${makeBubbles()}
      <div class="card-label">${n.category}</div>
      <h2>${n.title}</h2>
      ${n.formula?`<div class="formula">${n.formula}</div>`:''}
      ${n.notes?`<p>${n.notes}</p>`:''}
      ${n.tags&&n.tags.length?`<div style="margin-top:0.5rem">${n.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:''}
      <div class="actions">
        <button class="del-btn" onclick="deleteNote(${n.id})">✕ Remove</button>
      </div>
    </div>
  `).join('');
}

function makeBubbles(){
  const sizes=[8,12,6,10,7,5];
  const positions=[[90,10],[95,30],[85,20],[92,15],[88,25],[93,18]];
  return sizes.slice(0,4).map((s,i)=>{
    const [l,t]=positions[i];
    const dur=2+Math.random()*3;
    return `<div class="bubble" style="width:${s}px;height:${s}px;left:${l}%;top:${t}%;animation-duration:${dur.toFixed(1)}s;animation-delay:${(i*0.8).toFixed(1)}s"></div>`
  }).join('');
}

function deleteNote(id){
  notes=notes.filter(n=>n.id!==id);
  renderNotes();
}

// --- FORM ---
let formOpen=false;
function toggleForm(){
  formOpen=!formOpen;
  document.getElementById('addForm').style.display=formOpen?'block':'none';
  const btn=document.getElementById('toggleBtn');
  btn.textContent=formOpen?'✕ Cancel':'＋ Add new entry';
  btn.classList.toggle('open',formOpen);
}

function addEntry(){
  const title=document.getElementById('entryTitle').value.trim();
  if(!title){alert('Please enter a topic title.');return;}
  const entry={
    id:nextId++,
    category:document.getElementById('entryCategory').value,
    title,
    formula:document.getElementById('entryFormula').value.trim(),
    notes:document.getElementById('entryNotes').value.trim(),
    tags:[]
  };
  notes.unshift(entry);
  renderNotes();
  document.getElementById('entryTitle').value='';
  document.getElementById('entryFormula').value='';
  document.getElementById('entryNotes').value='';
  toggleForm();
  document.querySelector('.notes-scroll').scrollTop=0;
}

// --- TABS ---
function switchTab(tab){
  document.querySelectorAll('.notes-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  event.target.classList.add('active');
}

// --- CALCULATOR ---
let calcExpr='';
let justEvaled=false;

function display(){
  document.getElementById('calcVal').textContent=calcExpr||'0';
  document.getElementById('calcExpr').textContent='';
}

function calcInput(v){
  if(justEvaled&&/\d/.test(v)){calcExpr='';justEvaled=false;}
  calcExpr+=v;display();
}

function calcFn(fn){
  justEvaled=false;
  if(fn==='('){
    // toggle open or close paren
    const opens=(calcExpr.match(/\(/g)||[]).length;
    const closes=(calcExpr.match(/\)/g)||[]).length;
    calcExpr+=opens>closes?')':'(';
  } else if(fn==='^'){
    calcExpr+='**';
  } else if(fn==='ln('){
    calcExpr+='Math.log(';
  } else if(fn==='log('){
    calcExpr+='Math.log10(';
  } else if(fn==='sqrt('){
    calcExpr+='Math.sqrt(';
  } else if(fn==='abs('){
    calcExpr+='Math.abs(';
  } else if(fn==='floor('){
    calcExpr+='Math.floor(';
  } else if(fn==='ceil('){
    calcExpr+='Math.ceil(';
  } else if(fn==='sin('){
    calcExpr+='Math.sin(';
  } else if(fn==='cos('){
    calcExpr+='Math.cos(';
  } else if(fn==='tan('){
    calcExpr+='Math.tan(';
  } else if(fn==='1/'){
    calcExpr='1/('+calcExpr+')';
  } else {
    calcExpr+=fn;
  }
  display();
}

function calcClear(){calcExpr='';justEvaled=false;document.getElementById('calcVal').textContent='0';document.getElementById('calcExpr').textContent='';}
function calcBack(){calcExpr=calcExpr.slice(0,-1);display();}

function calcEval(){
  try{
    document.getElementById('calcExpr').textContent=calcExpr+' =';
    let expr=calcExpr;
    const result=Function('"use strict";return ('+expr+')')();
    if(typeof result==='number'&&isFinite(result)){
      const r=parseFloat(result.toPrecision(12));
      document.getElementById('calcVal').textContent=r;
      calcExpr=String(r);
    } else {
      document.getElementById('calcVal').textContent='Error';
      calcExpr='';
    }
  }catch(e){
    document.getElementById('calcVal').textContent='Syntax error';
    calcExpr='';
  }
  justEvaled=true;
}

document.addEventListener('keydown',e=>{
  if(document.getElementById('tab-calc').classList.contains('active')){
    if(/\d/.test(e.key))calcInput(e.key);
    else if(['+','-','*','/','%','(',')','.'].includes(e.key)){calcFn(e.key);}
    else if(e.key==='Enter'||e.key==='=')calcEval();
    else if(e.key==='Backspace')calcBack();
    else if(e.key==='Escape')calcClear();
  }
});

renderNotes();
</script>
</body>
</html>
